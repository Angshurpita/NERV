services:
  - type: web
    name: nerv-viper-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "python backend/main.py"
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.10.12
    # Ensure git is available for cloning repos
    # Render's native python environment includes git by default.
